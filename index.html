<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto CAD 2D - Engenharia de Software</title>
    <!-- Font Awesome para ícones estilo AutoCAD / ZWCAD -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Fabric.js para manipulação vetorial no canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <!-- React e ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel standalone para JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #2d2d2d;
            height: 100vh;
            overflow: hidden;
            color: #eee;
        }
        #root {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        /* Tema escuro estilo AutoCAD */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #1e1e1e;
        }
        .top-bar {
            background: #2c2c2c;
            border-bottom: 2px solid #3f3f3f;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #fff;
            font-size: 12px;
        }
        .top-bar i {
            margin-right: 4px;
            color: #9cdcfe;
        }
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Barra de ferramentas lateral esquerda (tools) */
        .tools-palette {
            width: 60px;
            background: #252526;
            border-right: 1px solid #3f3f3f;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 8px;
        }
        .tool-btn {
            width: 48px;
            height: 48px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #ddd;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            position: relative;
        }
        .tool-btn:hover {
            background: #094771;
            color: white;
        }
        .tool-btn.active {
            background: #0e639c;
            color: white;
            border-left: 3px solid #9cdcfe;
        }
        .tool-btn i {
            font-size: 24px;
        }
        /* Painel direito (camadas e propriedades) */
        .right-panel {
            width: 260px;
            background: #252526;
            border-left: 1px solid #3f3f3f;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-section {
            padding: 12px;
            border-bottom: 1px solid #3f3f3f;
        }
        .panel-section h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #9cdcfe;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }
        .layer-item:hover {
            background: #2a2d2e;
        }
        .layer-color {
            width: 16px;
            height: 16px;
            border-radius: 2px;
            border: 1px solid #555;
        }
        .property-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin: 4px 0;
        }
        .property-row select, .property-row input {
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            width: 120px;
        }
        /* Área central do canvas */
        .canvas-container-wrapper {
            flex: 1;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Barra inferior (linha de comando) */
        .command-bar {
            background: #2c2c2c;
            border-top: 2px solid #3f3f3f;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            gap: 8px;
        }
        .command-prompt {
            color: #9cdcfe;
            font-weight: bold;
        }
        .command-input {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #555;
            color: #eee;
            padding: 6px 10px;
            border-radius: 2px;
            outline: none;
            font-family: 'Courier New', monospace;
        }
        .command-history {
            color: #aaa;
            font-size: 12px;
            overflow: hidden;
            white-space: nowrap;
        }
        /* Status bar */
        .status-bar {
            background: #2c2c2c;
            border-top: 1px solid #3f3f3f;
            padding: 2px 10px;
            font-size: 12px;
            display: flex;
            gap: 20px;
        }
        .badge {
            background: #094771;
            padding: 2px 6px;
            border-radius: 3px;
            color: white;
        }
        /* Botões de ferramentas de edição no topo */
        .edit-tools {
            display: flex;
            gap: 4px;
            background: #333;
            padding: 4px;
            border-radius: 4px;
        }
        .edit-tools button {
            background: none;
            border: none;
            color: #ccc;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 13px;
        }
        .edit-tools button:hover {
            background: #094771;
        }
        .separator {
            width: 1px;
            background: #555;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // ----------------------------------------------
        // Módulo de geometria / motor geométrico (simulado com Fabric)
        // Aqui definimos classes para entidades e utilitários de geometria.
        // ----------------------------------------------
        const Geometry = (() => {
            class Point {
                constructor(x, y) { this.x = x; this.y = y; }
            }

            // Classe base para entidades (serão wrappers para objetos Fabric)
            class Entity {
                constructor(type, layer = '0', color = '#ffffff', lineType = 'solid', lineWidth = 1) {
                    this.id = Math.random().toString(36).substr(2, 9);
                    this.type = type;
                    this.layer = layer;
                    this.color = color;
                    this.lineType = lineType;
                    this.lineWidth = lineWidth;
                    // Fabric object será anexado depois
                }
            }

            class Line extends Entity {
                constructor(p1, p2, layer, color) {
                    super('line', layer, color);
                    this.p1 = p1;
                    this.p2 = p2;
                }
            }

            class Circle extends Entity {
                constructor(center, radius, layer, color) {
                    super('circle', layer, color);
                    this.center = center;
                    this.radius = radius;
                }
            }

            // Motor de snap (simplificado para endpoints e midpoint)
            const SnapEngine = {
                findSnapPoint(mousePoint, entities, activeSnaps) {
                    // Versão simplificada: retorna o ponto mais próximo se estiver dentro da tolerância
                    const tolerance = 10; // pixels
                    let bestPoint = null;
                    let bestDist = tolerance;

                    for (let obj of entities) {
                        if (!obj.fabricObj) continue;
                        // Extrair geometria do objeto Fabric (depende do tipo)
                        if (obj.type === 'line') {
                            const p1 = new Point(obj.fabricObj.x1, obj.fabricObj.y1);
                            const p2 = new Point(obj.fabricObj.x2, obj.fabricObj.y2);
                            
                            // endpoint
                            if (activeSnaps.endpoint) {
                                [p1, p2].forEach(p => {
                                    const dist = Math.hypot(p.x - mousePoint.x, p.y - mousePoint.y);
                                    if (dist < bestDist) {
                                        bestDist = dist;
                                        bestPoint = p;
                                    }
                                });
                            }
                            // midpoint
                            if (activeSnaps.midpoint) {
                                const mid = new Point((p1.x + p2.x)/2, (p1.y + p2.y)/2);
                                const dist = Math.hypot(mid.x - mousePoint.x, mid.y - mousePoint.y);
                                if (dist < bestDist) {
                                    bestDist = dist;
                                    bestPoint = mid;
                                }
                            }
                        }
                        // outros tipos poderiam ser adicionados
                    }
                    return bestPoint;
                }
            };

            // Motor de dimensões (esboço)
            const DimensionEngine = {
                createLinearDimension(p1, p2, offset) {
                    // Retorna um objeto Fabric representando cota
                    return new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
                        stroke: '#00ff00',
                        strokeWidth: 1,
                        strokeDashArray: [5, 3],
                        selectable: true
                    });
                }
            };

            return { Point, Entity, Line, Circle, SnapEngine, DimensionEngine };
        })();

        // ----------------------------------------------
        // Componentes React
        // ----------------------------------------------
        const { useState, useEffect, useRef } = React;

        // Componente do Canvas (usa Fabric.js)
        const CanvasComponent = ({ currentCommand, setCommandLineMessage, activeSnap, orthoMode, gridEnabled, layers }) => {
            const canvasRef = useRef(null);
            const fabricCanvasRef = useRef(null);
            const [entities, setEntities] = useState([]);
            const [zoom, setZoom] = useState(1);
            const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });

            // Inicializa o canvas Fabric
            useEffect(() => {
                const canvas = new fabric.Canvas('canvas', {
                    selection: true,
                    preserveObjectStacking: true,
                    backgroundColor: '#1a1a1a',
                });
                fabricCanvasRef.current = canvas;

                // Adicionar grid (personalizado via desenho no background)
                const drawGrid = () => {
                    const width = canvas.width;
                    const height = canvas.height;
                    const gridSize = 20; // 20px entre linhas
                    const ctx = canvas.getContext();
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 0.5;
                    // Desenha linhas verticais e horizontais
                    for (let i = 0; i < width; i += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(i, 0);
                        ctx.lineTo(i, height);
                        ctx.strokeStyle = '#333';
                        ctx.stroke();
                    }
                    for (let i = 0; i < height; i += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, i);
                        ctx.lineTo(width, i);
                        ctx.strokeStyle = '#333';
                        ctx.stroke();
                    }
                };
                // Não podemos desenhar diretamente porque o Fabric gerencia o contexto.
                // Usamos 'after:render' para desenhar o grid
                canvas.on('after:render', () => {
                    if (!gridEnabled) return;
                    const ctx = canvas.getContext();
                    const vpt = canvas.viewportTransform;
                    const gridSize = 20; // deve ser escalado? Vamos simplificar.
                    ctx.save();
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 0.5;
                    // Desenha grid baseado no viewport (ignorando transform por simplicidade)
                    // Para um grid correto, precisamos transformar coordenadas. Vamos fazer simples.
                    const width = canvas.width;
                    const height = canvas.height;
                    ctx.beginPath();
                    for (let i = 0; i < width; i += gridSize) {
                        ctx.moveTo(i, 0);
                        ctx.lineTo(i, height);
                    }
                    for (let i = 0; i < height; i += gridSize) {
                        ctx.moveTo(0, i);
                        ctx.lineTo(width, i);
                    }
                    ctx.stroke();
                    ctx.restore();
                });
                canvas.renderAll();

                // Zoom com roda do mouse
                canvas.on('mouse:wheel', (opt) => {
                    const delta = opt.e.deltaY;
                    let zoom = canvas.getZoom();
                    zoom *= 0.999 ** delta;
                    if (zoom > 20) zoom = 20;
                    if (zoom < 0.01) zoom = 0.01;
                    canvas.zoomToPoint({ x: opt.e.offsetX, y: opt.e.offsetY }, zoom);
                    opt.e.preventDefault();
                    opt.e.stopPropagation();
                });

                // Pan com botão do meio (simples)
                let isPanning = false;
                let lastPosX, lastPosY;
                canvas.on('mouse:down', (opt) => {
                    if (opt.e.button === 1) { // botão do meio
                        isPanning = true;
                        lastPosX = opt.e.clientX;
                        lastPosY = opt.e.clientY;
                        canvas.selection = false;
                        opt.e.preventDefault();
                    }
                });
                canvas.on('mouse:move', (opt) => {
                    if (isPanning) {
                        const vpt = canvas.viewportTransform;
                        vpt[4] += opt.e.clientX - lastPosX;
                        vpt[5] += opt.e.clientY - lastPosY;
                        canvas.requestRenderAll();
                        lastPosX = opt.e.clientX;
                        lastPosY = opt.e.clientY;
                        opt.e.preventDefault();
                    }
                });
                canvas.on('mouse:up', (opt) => {
                    if (opt.e.button === 1) {
                        isPanning = false;
                        canvas.selection = true;
                    }
                });

                return () => {
                    canvas.dispose();
                };
            }, []);

            // Exemplo de criação de linha via comando (será chamado pelo CommandLine)
            const addLine = (p1, p2) => {
                if (!fabricCanvasRef.current) return;
                const line = new fabric.Line([p1.x, p1.y, p2.x, p2.y], {
                    stroke: 'white',
                    strokeWidth: 2,
                    selectable: true,
                    hasControls: true,
                    hasBorders: true,
                });
                fabricCanvasRef.current.add(line);
                // Armazenar metadata
                line.entityData = { type: 'line', layer: '0' };
                fabricCanvasRef.current.renderAll();
            };

            // Expor funções globalmente para o comando
            window.__cad = { addLine, fabricCanvas: fabricCanvasRef };

            return (
                <div className="canvas-container-wrapper">
                    <canvas id="canvas" width="800" height="600" />
                </div>
            );
        };

        // Componente da Barra de Ferramentas (esquerda)
        const Toolbar = ({ setCurrentTool, currentTool }) => {
            const tools = [
                { id: 'line', icon: 'fa-solid fa-slash', label: 'Linha' },
                { id: 'polyline', icon: 'fa-solid fa-draw-polygon', label: 'Polilinha' },
                { id: 'rect', icon: 'fa-regular fa-square', label: 'Retângulo' },
                { id: 'circle', icon: 'fa-regular fa-circle', label: 'Círculo' },
                { id: 'arc', icon: 'fa-solid fa-chart-line', label: 'Arco' },
                { id: 'ellipse', icon: 'fa-regular fa-circle', label: 'Elipse' },
                { id: 'polygon', icon: 'fa-solid fa-star', label: 'Polígono' },
                { id: 'select', icon: 'fa-solid fa-arrow-pointer', label: 'Selecionar' },
                { id: 'move', icon: 'fa-solid fa-up-down-left-right', label: 'Mover' },
                { id: 'copy', icon: 'fa-regular fa-copy', label: 'Copiar' },
                { id: 'rotate', icon: 'fa-solid fa-rotate-right', label: 'Rotacionar' },
                { id: 'scale', icon: 'fa-solid fa-expand', label: 'Escalar' },
                { id: 'trim', icon: 'fa-solid fa-cut', label: 'Aparar' },
                { id: 'extend', icon: 'fa-solid fa-arrow-right-long', label: 'Estender' },
                { id: 'offset', icon: 'fa-solid fa-clone', label: 'Offset' },
                { id: 'mirror', icon: 'fa-solid fa-code-branch', label: 'Espelhar' },
                { id: 'explode', icon: 'fa-solid fa-explosion', label: 'Explodir' },
            ];
            return (
                <div className="tools-palette">
                    {tools.map(tool => (
                        <button
                            key={tool.id}
                            className={`tool-btn ${currentTool === tool.id ? 'active' : ''}`}
                            onClick={() => setCurrentTool(tool.id)}
                            title={tool.label}
                        >
                            <i className={tool.icon}></i>
                        </button>
                    ))}
                </div>
            );
        };

        // Painel de Camadas (Layers)
        const LayerPanel = ({ layers, setLayers, currentLayer, setCurrentLayer }) => {
            // Exemplo de layers iniciais
            const [localLayers, setLocalLayers] = useState([
                { name: '0', color: '#ffffff', visible: true, locked: false, lineType: 'Continuous' },
                { name: 'Camada 1', color: '#ff6666', visible: true, locked: false, lineType: 'Dashed' },
                { name: 'Dimensões', color: '#66ff66', visible: true, locked: false, lineType: 'Continuous' },
            ]);

            return (
                <div className="right-panel">
                    <div className="panel-section">
                        <h3><i className="fa-solid fa-layer-group"></i> Camadas</h3>
                        {localLayers.map(layer => (
                            <div key={layer.name} className="layer-item" onClick={() => setCurrentLayer(layer.name)}>
                                <div className="layer-color" style={{ background: layer.color }}></div>
                                <span style={{ fontWeight: currentLayer === layer.name ? 'bold' : 'normal' }}>{layer.name}</span>
                                <i className="fa-regular fa-eye" style={{ marginLeft: 'auto', color: layer.visible ? '#9cdcfe' : '#555' }}></i>
                                <i className="fa-solid fa-lock" style={{ color: layer.locked ? '#9cdcfe' : '#555' }}></i>
                            </div>
                        ))}
                        <button style={{ marginTop: 8, background: '#094771', border: 'none', color: 'white', padding: '4px', width: '100%' }}>
                            <i className="fa-solid fa-plus"></i> Nova Layer
                        </button>
                    </div>
                    <div className="panel-section">
                        <h3><i className="fa-regular fa-pen-to-square"></i> Propriedades</h3>
                        <div className="property-row">
                            <span>Cor:</span>
                            <select>
                                <option>Branco</option>
                                <option>Vermelho</option>
                                <option>Verde</option>
                                <option>Azul</option>
                            </select>
                        </div>
                        <div className="property-row">
                            <span>Tipo de linha:</span>
                            <select>
                                <option>Continuous</option>
                                <option>Dashed</option>
                                <option>Dotted</option>
                            </select>
                        </div>
                        <div className="property-row">
                            <span>Espessura:</span>
                            <input type="number" value="0.25" step="0.05" />
                        </div>
                    </div>
                    <div className="panel-section">
                        <h3><i class="fa-solid fa-ruler"></i> Cotas</h3>
                        <button style={{ width: '100%', marginBottom: 4 }}>Linear</button>
                        <button style={{ width: '100%', marginBottom: 4 }}>Alinhada</button>
                        <button style={{ width: '100%', marginBottom: 4 }}>Angular</button>
                        <button style={{ width: '100%' }}>Raio/Diâmetro</button>
                    </div>
                </div>
            );
        };

        // Linha de comando estilo AutoCAD
        const CommandLine = ({ commandHistory, onCommand }) => {
            const [input, setInput] = useState('');
            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    onCommand(input);
                    setInput('');
                }
            };
            return (
                <div className="command-bar">
                    <span className="command-prompt">Comando:</span>
                    <input
                        type="text"
                        className="command-input"
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={handleKeyDown}
                        placeholder="Digite um comando (LINE, CIRCLE, etc.)"
                    />
                    <div className="command-history">
                        {commandHistory.map((cmd, idx) => <span key={idx}>{cmd} </span>)}
                    </div>
                </div>
            );
        };

        // Componente principal App
        const App = () => {
            const [currentTool, setCurrentTool] = useState('line');
            const [currentLayer, setCurrentLayer] = useState('0');
            const [commandHistory, setCommandHistory] = useState(['LINE', 'Especifique primeiro ponto:']);
            const [commandInput, setCommandInput] = useState('');
            const [orthoMode, setOrthoMode] = useState(false);
            const [gridSnap, setGridSnap] = useState(true);
            const [objectSnap, setObjectSnap] = useState({ endpoint: true, midpoint: true, intersection: false, perpendicular: false });
            const [educationalMode, setEducationalMode] = useState(false);
            const [commandMessage, setCommandMessage] = useState('');

            // Processa comandos da linha de comando
            const handleCommand = (cmd) => {
                const upper = cmd.trim().toUpperCase();
                setCommandHistory(prev => [...prev, cmd]);
                if (upper === 'LINE') {
                    setCommandMessage('LINE: Especifique o primeiro ponto');
                    // Aqui ativaríamos modo de desenho de linha
                } else if (upper.startsWith('@')) {
                    // coordenada relativa
                    setCommandMessage('Coordenada relativa detectada');
                } else {
                    setCommandMessage(`Comando desconhecido: ${cmd}`);
                }
            };

            return (
                <div className="app">
                    {/* Barra superior com ferramentas de edição e status */}
                    <div className="top-bar">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                            <i className="fa-solid fa-cubes"></i>
                            <span>Projeto CAD 2D</span>
                        </div>
                        <div className="edit-tools">
                            <button><i className="fa-regular fa-floppy-disk"></i> Salvar</button>
                            <button><i className="fa-solid fa-upload"></i> Exportar</button>
                            <button><i className="fa-regular fa-file-pdf"></i> PDF</button>
                            <button><i className="fa-regular fa-image"></i> PNG</button>
                            <button><i className="fa-solid fa-vector-square"></i> SVG</button>
                        </div>
                        <div style={{ display: 'flex', gap: '12px', marginLeft: 'auto' }}>
                            <span><i className="fa-regular fa-compass"></i> ORTO {orthoMode ? 'ON' : 'OFF'}</span>
                            <span><i className="fa-regular fa-grid"></i> SNAP {gridSnap ? 'ON' : 'OFF'}</span>
                            <span><i className="fa-solid fa-graduation-cap"></i> Modo Didático</span>
                        </div>
                    </div>

                    <div className="main-area">
                        {/* Barra de ferramentas esquerda */}
                        <Toolbar setCurrentTool={setCurrentTool} currentTool={currentTool} />

                        {/* Área central com canvas */}
                        <CanvasComponent
                            currentCommand={currentTool}
                            setCommandLineMessage={setCommandMessage}
                            activeSnap={objectSnap}
                            orthoMode={orthoMode}
                            gridEnabled={gridSnap}
                            layers={[]}
                        />

                        {/* Painel direito */}
                        <LayerPanel
                            layers={[]}
                            setLayers={() => {}}
                            currentLayer={currentLayer}
                            setCurrentLayer={setCurrentLayer}
                        />
                    </div>

                    {/* Linha de comando */}
                    <CommandLine commandHistory={commandHistory} onCommand={handleCommand} />

                    {/* Barra de status inferior */}
                    <div className="status-bar">
                        <span><i className="fa-regular fa-coordinate"></i> 12.345, 67.890</span>
                        <span className="badge">GRID 1.0</span>
                        <span>Camada: {currentLayer}</span>
                        <span>Ferramenta: {currentTool}</span>
                        {educationalMode && <span><i className="fa-regular fa-eye"></i> Modo Educacional Ativo</span>}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
    <!-- Nota: Devido à complexidade, algumas funcionalidades são conceituais. O projeto segue a arquitetura descrita e pode ser expandido. -->
</body>
</html>
